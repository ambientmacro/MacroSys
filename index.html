<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F2542" />
  <meta name="description" content="MACRO AMBIENTAL — Sistema de gestão de frota, motoristas e checklists" />
  <!-- iOS PWA -->
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Macro Frota" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <title>MACRO AMBIENTAL — Gestão Operacional</title>
  <style>
    /* Splash inicial — mostrado ANTES do React montar, cobre o cold-start
         (download do Firebase SDK, chunks do Vite, etc.). Removido em main.jsx. */
    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      background: radial-gradient(circle at 20% 30%, #1E3A5F 0%, transparent 55%),
        radial-gradient(circle at 80% 70%, #2563EB 0%, transparent 55%),
        linear-gradient(135deg, #0F2542 0%, #16294A 50%, #1E3A5F 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Manrope, sans-serif;
      transition: opacity 400ms ease;
    }

    #app-splash.is-out {
      opacity: 0;
      pointer-events: none;
    }

    #app-splash .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: splash-pop 700ms cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    #app-splash .brand-drop {
      width: 84px;
      height: 84px;
      border-radius: 20px;
      background: linear-gradient(135deg, #3B82F6, #1D4ED8);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 60px rgba(37, 99, 235, 0.45);
    }

    #app-splash .brand-drop svg {
      width: 44px;
      height: 44px;
      fill: #fff;
    }

    #app-splash .brand-name {
      font-family: Outfit, Manrope, sans-serif;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      text-align: center;
    }

    #app-splash .brand-tag {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.55);
      font-weight: 700;
      margin-top: 4px;
    }

    #app-splash .loader {
      width: 180px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      overflow: hidden;
      position: relative;
    }

    #app-splash .loader::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, #60A5FA, transparent);
      animation: splash-slide 1.3s ease-in-out infinite;
    }

    #app-splash .hint {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      font-weight: 700;
    }

    @keyframes splash-pop {
      0% {
        opacity: 0;
        transform: translateY(12px) scale(0.96);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes splash-slide {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(100%);
      }
    }

    /* Estado "seen": aplicado por script inline abaixo quando a sessão já
         viu o splash. Escondemos INSTANTANEAMENTE (sem transição) para não
         "piscar" em navegações internas / reloads da mesma aba. */
    #app-splash.is-seen {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="app-splash" role="status" aria-live="polite" aria-label="Carregando MACRO AMBIENTAL">
    <div class="brand-wrap">
      <div class="brand-drop">
        <svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M128 24C88 88 48 128 48 168a80 80 0 0 0 160 0c0-40-40-80-80-144Z" />
        </svg>
      </div>
      <div>
        <div class="brand-name">MACRO AMBIENTAL</div>
        <div class="brand-tag">Engenharia · Saneamento</div>
      </div>
    </div>
    <div class="loader" aria-hidden="true"></div>
    <div class="hint">Preparando o sistema…</div>
  </div>
  <script>
    // Script inline (executa ANTES do bundle Vite): se o usuário já viu o
    // splash nesta sessão (mesma aba/janela), esconde imediatamente.
    // Isso mata o splash em F5 / navegações internas do dia a dia, mantendo
    // ele apenas no primeiro cold-start real da sessão.
    try {
      if (window.sessionStorage && sessionStorage.getItem("macro-splash-seen") === "1") {
        document.getElementById("app-splash").classList.add("is-seen");
      }
    } catch (e) { /* sessionStorage indisponível — mantém splash */ }
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
