<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MACRO AMBIENTAL — Manuais</title>
    <!--
      Visualizador de manuais markdown. O motivo dele existir:
      alguns servidores estáticos (Render, GitHub Pages) servem `.md` sem
      `Content-Type: text/markdown; charset=utf-8`. Sem o charset o browser
      assume Latin-1 e o conteúdo em pt-BR fica quebrado (mojibake).
      Aqui garantimos: (1) charset=utf-8 no HTML wrapper, (2) fetch com
      decode explícito UTF-8, (3) renderização de markdown → HTML com
      marked (CDN, sem build step).
    -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;900&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #F5F7FA;
        --panel: #FFFFFF;
        --ink: #0F1411;
        --muted: #4A564F;
        --border: #E2E8E4;
        --navy: #0F2542;
        --accent: #2563EB;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: Manrope, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg); color: var(--ink);
      }
      .topbar {
        position: sticky; top: 0; z-index: 10;
        background: linear-gradient(135deg, #0F2542 0%, #16294A 50%, #1E3A5F 100%);
        color: #fff; padding: 14px 20px;
        display: flex; align-items: center; gap: 16px;
        box-shadow: 0 4px 14px rgba(15, 37, 66, 0.15);
      }
      .brand {
        font-family: Outfit, sans-serif; font-weight: 900; letter-spacing: -0.02em;
        font-size: 18px; line-height: 1;
      }
      .tag {
        font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase;
        color: rgba(255,255,255,0.6); font-weight: 700; margin-top: 3px;
      }
      .picker { margin-left: auto; }
      .picker select {
        background: rgba(255,255,255,0.12);
        color: #fff; border: 1px solid rgba(255,255,255,0.25);
        border-radius: 8px; padding: 8px 12px; font-size: 13px; font-weight: 600;
        cursor: pointer; min-width: 220px;
      }
      .picker select option { color: #0F1411; }
      main {
        max-width: 900px; margin: 24px auto; padding: 0 20px 60px;
      }
      article {
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 12px; padding: 32px 40px;
        box-shadow: 0 4px 20px rgba(15, 37, 66, 0.04);
      }
      article h1 {
        font-family: Outfit, sans-serif; font-weight: 900; letter-spacing: -0.02em;
        font-size: 32px; margin: 0 0 8px; color: var(--navy);
      }
      article h2 {
        font-family: Outfit, sans-serif; font-weight: 900; font-size: 22px;
        margin: 32px 0 12px; padding-top: 20px; border-top: 1px solid var(--border);
        color: var(--navy);
      }
      article h3 { font-family: Outfit, sans-serif; font-weight: 700; font-size: 17px; margin: 24px 0 8px; color: var(--ink); }
      article h4 { font-weight: 700; font-size: 14px; margin: 18px 0 6px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
      article p, article li { line-height: 1.65; font-size: 14.5px; color: #1E3A2E; }
      article ul, article ol { padding-left: 22px; }
      article code {
        background: #EFF3F8; border: 1px solid #DDE4EE; padding: 1px 6px;
        border-radius: 4px; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 13px;
        color: var(--navy);
      }
      article pre {
        background: #0F2542; color: #E2E8F0; padding: 16px 18px; border-radius: 8px;
        overflow-x: auto; font-family: "SF Mono", Menlo, Consolas, monospace; font-size: 12.5px;
        line-height: 1.55;
      }
      article pre code { background: transparent; border: 0; color: inherit; padding: 0; }
      article blockquote {
        border-left: 4px solid var(--accent); background: #EFF3F8;
        margin: 16px 0; padding: 12px 18px; border-radius: 0 8px 8px 0;
        font-size: 14px; color: var(--navy);
      }
      article table {
        border-collapse: collapse; width: 100%; font-size: 13.5px; margin: 12px 0;
      }
      article th, article td {
        border: 1px solid var(--border); padding: 8px 12px; text-align: left; vertical-align: top;
      }
      article th { background: #EFF3F8; color: var(--navy); font-weight: 700; }
      article tr:nth-child(even) td { background: #FAFBFC; }
      article a { color: var(--accent); text-decoration: none; }
      article a:hover { text-decoration: underline; }
      article hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }
      .loading, .error {
        padding: 40px; text-align: center; color: var(--muted); font-size: 14px;
      }
      .error { color: #B91C1C; }
      .print-btn {
        display: inline-flex; align-items: center; gap: 6px;
        background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25);
        border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
        text-transform: uppercase; letter-spacing: 0.1em;
      }
      .print-btn:hover { background: rgba(255,255,255,0.25); }
      @media print {
        .topbar { display: none; }
        main { max-width: none; margin: 0; padding: 0; }
        article { border: 0; box-shadow: none; padding: 0; }
      }
      @media (max-width: 640px) {
        article { padding: 20px; }
        .picker select { min-width: 160px; font-size: 12px; }
        .brand { font-size: 15px; }
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <div>
        <div class="brand">MACRO AMBIENTAL</div>
        <div class="tag">Manuais do Sistema</div>
      </div>
      <div class="picker">
        <select id="doc-picker" aria-label="Escolher manual">
          <option value="manual-completo">📘 Manual Completo</option>
          <option value="manual-motorista">🚗 Motorista</option>
          <option value="manual-encarregado">👥 Encarregado</option>
          <option value="manual-frota">🚚 Administrador de Frota</option>
          <option value="manual-dp">📋 Departamento Pessoal (DP)</option>
          <option value="manual-seguranca">🛡 Segurança do Trabalho</option>
          <option value="manual-medicao">📊 Medição</option>
          <option value="manual-performance">🧾 Performance</option>
          <option value="manual-admin">💻 Administrador TI</option>
        </select>
      </div>
      <button class="print-btn" onclick="window.print()" title="Imprimir ou salvar em PDF">🖨 Imprimir / PDF</button>
    </div>
    <main>
      <article id="content">
        <div class="loading">Carregando manual…</div>
      </article>
    </main>
    <!-- Marked (renderer de markdown) via CDN — sem build step. -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <script>
      (function () {
        const contentEl = document.getElementById("content");
        const picker = document.getElementById("doc-picker");

        // Lê ?doc=<slug> da URL. Default: manual-completo.
        function getRequestedDoc() {
          const params = new URLSearchParams(window.location.search);
          const raw = (params.get("doc") || "manual-completo").trim();
          // Sanitiza: só nossos slugs permitidos (evita path traversal).
          const allowed = [
            "manual-completo", "manual-motorista", "manual-encarregado",
            "manual-frota", "manual-dp", "manual-seguranca",
            "manual-medicao", "manual-performance", "manual-admin",
          ];
          return allowed.includes(raw) ? raw : "manual-completo";
        }

        async function loadDoc(slug) {
          contentEl.innerHTML = '<div class="loading">Carregando manual…</div>';
          try {
            const res = await fetch("/manuais/" + slug + ".md", { cache: "no-cache" });
            if (!res.ok) throw new Error("HTTP " + res.status);
            // Forçamos UTF-8 no decode (independente do Content-Type do server).
            const buf = await res.arrayBuffer();
            const text = new TextDecoder("utf-8").decode(buf);
            const html = window.marked.parse(text, { breaks: false, gfm: true });
            contentEl.innerHTML = html;
            document.title = "MACRO AMBIENTAL — " + slug.replace(/^manual-/, "").replace(/^\w/, c => c.toUpperCase());
            window.scrollTo(0, 0);
          } catch (e) {
            contentEl.innerHTML = '<div class="error">Falha ao carregar o manual (' + e.message + '). Verifique se o arquivo <code>/manuais/' + slug + '.md</code> existe.</div>';
          }
        }

        // Sincroniza o select com o querystring.
        const initial = getRequestedDoc();
        picker.value = initial;
        loadDoc(initial);

        picker.addEventListener("change", () => {
          const slug = picker.value;
          const url = new URL(window.location.href);
          url.searchParams.set("doc", slug);
          history.replaceState({}, "", url.toString());
          loadDoc(slug);
        });
      })();
    </script>
  </body>
</html>
